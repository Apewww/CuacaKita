<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CuacaKita - Widget Cuaca Modern</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#3b82f6">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px border rgba(255, 255, 255, 0.2);
        }

        .dark .glass {
            background: rgba(17, 24, 39, 0.6);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .weather-card {
            transition: transform 0.3s ease;
        }

        .weather-card:hover {
            transform: translateY(-5px);
        }

        [v-cloak] {
            display: none;
        }
    </style>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        secondary: '#10b981',
                    }
                }
            }
        }
    </script>
</head>

<body
    class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen dark:from-slate-900 dark:to-slate-800 dark:text-gray-100 flex items-center justify-center p-4">

    <div class="max-w-md w-full space-y-6">
        <!-- Header & Theme Toggle -->
        <div class="flex justify-between items-center mb-8">
            <h1
                class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-indigo-600 dark:from-blue-400 dark:to-indigo-400">
                CuacaKita
            </h1>
            <div class="flex items-center gap-2">
                <button id="noti-btn" title="Pengaturan Notifikasi"
                    class="p-2 rounded-full glass hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors">
                    <i id="noti-icon" data-lucide="bell-off" class="w-6 h-6"></i>
                </button>
                <button id="theme-toggle"
                    class="p-2 rounded-full glass hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors hidden">
                    <i data-lucide="moon" class="w-6 h-6 block dark:hidden"></i>
                    <i data-lucide="sun" class="w-6 h-6 hidden dark:block"></i>
                </button>
            </div>
        </div>

        <!-- Search Input -->
        <div class="relative group">
            <input type="text" id="city-input" placeholder="Masukkan nama kota..."
                class="w-full px-5 py-4 pl-12 rounded-2xl glass border-0 focus:ring-2 focus:ring-blue-500 outline-none transition-all shadow-lg dark:bg-slate-800/50">
            <i data-lucide="search"
                class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400 group-focus-within:text-blue-500 transition-colors"></i>
            <button id="search-btn"
                class="absolute right-3 top-1/2 -translate-y-1/2 bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-xl transition-all font-medium shadow-md">
                Cari
            </button>
        </div>

        <!-- Weather Widget -->
        <div id="weather-widget"
            class="glass rounded-[2rem] p-8 shadow-2xl weather-card border relative overflow-hidden hidden">
            <!-- Loading Overlay -->
            <div id="loading"
                class="absolute inset-0 bg-white/50 dark:bg-slate-900/50 flex items-center justify-center z-10 hidden">
                <div class="animate-spin rounded-full h-12 w-12 border-4 border-blue-500 border-t-transparent"></div>
            </div>

            <div class="flex justify-between items-start">
                <div>
                    <h2 id="city-name" class="text-3xl font-bold text-gray-800 dark:text-white">-</h2>
                    <p id="local-time" class="text-sm text-gray-500 dark:text-gray-400 mt-1">-</p>
                </div>
                <img id="weather-icon" src="" alt="Icon" class="w-20 h-20 -mt-4">
            </div>

            <div class="mt-8 flex items-end gap-1">
                <span id="temp" class="text-7xl font-bold tracking-tighter text-blue-600 dark:text-blue-400">-</span>
                <span class="text-3xl font-medium text-gray-400 mb-2">°C</span>
            </div>

            <p id="condition" class="text-xl font-medium text-gray-700 dark:text-gray-300 mt-2 uppercase tracking-wide">
                -</p>

            <div class="grid grid-cols-2 gap-4 mt-8 border-t border-gray-200 dark:border-gray-700/50 pt-8">
                <div class="flex items-center gap-3">
                    <div class="p-2 bg-blue-100 dark:bg-blue-900/30 rounded-lg">
                        <i data-lucide="droplets" class="w-5 h-5 text-blue-600 dark:text-blue-400"></i>
                    </div>
                    <div>
                        <p class="text-xs text-gray-500 dark:text-gray-400">Kelembaban</p>
                        <p id="humidity" class="font-semibold text-gray-800 dark:text-gray-200">- %</p>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <div class="p-2 bg-indigo-100 dark:bg-indigo-900/30 rounded-lg">
                        <i data-lucide="wind" class="w-5 h-5 text-indigo-600 dark:text-indigo-400"></i>
                    </div>
                    <div>
                        <p class="text-xs text-gray-500 dark:text-gray-400">Kecepatan Angin</p>
                        <p id="wind-speed" class="font-semibold text-gray-800 dark:text-gray-200">- km/h</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Error Message -->
        <div id="error-msg"
            class="hidden p-4 bg-red-100 dark:bg-red-900/30 text-red-600 dark:text-red-400 rounded-xl text-center font-medium border border-red-200 dark:border-red-800/50">
            Ups! Kota tidak ditemukan. Silakan coba lagi.
        </div>
    </div>

    <script>
        // Init Lucide Icons
        lucide.createIcons();

        // Theme Logic
        const body = document.body;
        const themeToggle = document.getElementById('theme-toggle');

        // Check local storage
        if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            body.classList.add('dark');
        }

        themeToggle.addEventListener('click', () => {
            body.classList.toggle('dark');
            localStorage.setItem('theme', body.classList.contains('dark') ? 'dark' : 'light');
        });

        // Weather Logic
        const cityInput = document.getElementById('city-input');
        const searchBtn = document.getElementById('search-btn');
        const widget = document.getElementById('weather-widget');
        const errorMsg = document.getElementById('error-msg');
        const loading = document.getElementById('loading');

        async function fetchWeather(city) {
            loading.classList.remove('hidden');
            errorMsg.classList.add('hidden');

            try {
                const response = await fetch(`/api/weather?city=${encodeURIComponent(city)}`);
                const data = await response.json();

                if (response.ok) {
                    updateUI(data);
                    widget.classList.remove('hidden');
                } else {
                    throw new Error(data.error);
                }
            } catch (err) {
                errorMsg.classList.remove('hidden');
                widget.classList.add('hidden');
            } finally {
                loading.classList.add('hidden');
            }
        }

        function updateUI(data) {
            document.getElementById('city-name').textContent = data.location.name;
            document.getElementById('local-time').textContent = new Date(data.location.localtime).toLocaleDateString('id-ID', {
                weekday: 'long', day: 'numeric', month: 'long'
            });
            document.getElementById('temp').textContent = Math.round(data.current.temp_c);
            document.getElementById('condition').textContent = data.current.condition.text;
            document.getElementById('weather-icon').src = data.current.condition.icon.replace('//', 'https://');
            document.getElementById('humidity').textContent = data.current.humidity + ' %';
            document.getElementById('wind-speed').textContent = data.current.wind_kph + ' km/h';
        }

        searchBtn.addEventListener('click', () => {
            const city = cityInput.value.trim();
            if (city) fetchWeather(city);
        });

        cityInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const city = cityInput.value.trim();
                if (city) fetchWeather(city);
            }
        });

        // Initial Load with Geolocation
        if (navigator.geolocation) {
            console.log('Detecting location...');
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const { latitude, longitude } = position.coords;
                    console.log('Location found:', latitude, longitude);
                    fetchWeather(`${latitude},${longitude}`);
                },
                (error) => {
                    console.warn('Geolocation failed or denied, using default city.');
                    fetchWeather('Cimahi');
                }
            );
        } else {
            fetchWeather('Cimahi');
        }

        // PWA & Push Notification Logic
        const notiBtn = document.getElementById('noti-btn');
        const notiIcon = document.getElementById('noti-icon');
        let isSubscribed = false;

        if ('serviceWorker' in navigator && 'PushManager' in window) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => {
                        console.log('SW Registered');
                        checkSubscription(reg);
                    })
                    .catch(err => console.error('SW Registration failed', err));
            });
        }

        async function checkSubscription(reg) {
            try {
                const sub = await reg.pushManager.getSubscription();
                if (!sub) {
                    updateNotiUI(false);
                    return;
                }

                // Pengecekan aman ke server tanpa debug-subs
                const response = await fetch('/api/check-status', {
                    method: 'POST',
                    body: JSON.stringify({ endpoint: sub.endpoint }),
                    headers: { 'Content-Type': 'application/json' }
                });
                const data = await response.json();

                isSubscribed = (data.status === 'subscribed');
                updateNotiUI(isSubscribed);
            } catch (err) {
                console.error('Gagal cek status:', err);
            }
        }

        function updateNotiUI(active) {
            isSubscribed = active;
            if (active) {
                notiIcon.setAttribute('data-lucide', 'bell');
                notiBtn.classList.add('text-blue-500');
            } else {
                notiIcon.setAttribute('data-lucide', 'bell-off');
                notiBtn.classList.remove('text-blue-500');
            }
            lucide.createIcons();
        }

        notiBtn.addEventListener('click', async () => {
            if (isSubscribed) {
                await unsubscribeUser();
            } else {
                const permission = await Notification.requestPermission();
                if (permission === 'granted') {
                    await subscribeUser();
                } else {
                    alert('Izin notifikasi ditolak.');
                }
            }
        });

        async function subscribeUser() {
            try {
                const reg = await navigator.serviceWorker.ready;
                const response = await fetch('/api/vapid-public-key');
                const { publicKey } = await response.json();

                const subscription = await reg.pushManager.subscribe({
                    userVisibleOnly: true,
                    applicationServerKey: urlBase64ToUint8Array(publicKey)
                });

                const currentCity = document.getElementById('city-name').textContent || 'Cimahi';

                await fetch('/api/subscribe', {
                    method: 'POST',
                    body: JSON.stringify({ subscription, city: currentCity }),
                    headers: { 'Content-Type': 'application/json' }
                });

                updateNotiUI(true);
                alert(`Notifikasi aktif untuk ${currentCity}`);
            } catch (err) {
                console.error('Gagal subscribe:', err);
            }
        }


        async function unsubscribeUser() {
            try {
                const reg = await navigator.serviceWorker.ready;
                const sub = await reg.pushManager.getSubscription();

                if (sub) {
                    // Hapus di server
                    await fetch('/api/unsubscribe', {
                        method: 'POST',
                        body: JSON.stringify({ endpoint: sub.endpoint }),
                        headers: { 'Content-Type': 'application/json' }
                    });
                    // Hapus di browser
                    await sub.unsubscribe();
                }

                updateNotiUI(false);
                alert('Notifikasi dimatikan.');
            } catch (err) {
                console.error('Gagal unsubscribe:', err);
            }
        }

        function urlBase64ToUint8Array(base64String) {
            const padding = '='.repeat((4 - base64String.length % 4) % 4);
            const base64 = (base64String + padding).replace(/\-/g, '+').replace(/_/g, '/');
            const rawData = window.atob(base64);
            const outputArray = new Uint8Array(rawData.length);
            for (let i = 0; i < rawData.length; ++i) {
                outputArray[i] = rawData.charCodeAt(i);
            }
            return outputArray;
        }
    </script>
</body>

</html>
